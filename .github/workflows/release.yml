name: Release Workflow

on:
  # Trigger A: Automatic execution when Main Workflow finishes
  workflow_run:
    workflows: ["Main Workflow"]
    types:
      - completed
  
  # Trigger B: Manual execution fallback from the GitHub UI
  workflow_dispatch:
    inputs:
      manual_tag:
        description: 'Tag to release (e.g., v1.2.3)'
        required: true
        type: string
      override_run_id:
        description: 'Main Workflow Run ID (Required if downloading artifacts)'
        required: true
        type: string

# Permissions required for Git Releases and GitHub Container Registry uploads
permissions:
  contents: write
  packages: write

jobs:
  prep-release:
    runs-on: ubuntu-latest
    outputs:
      is_valid_release: ${{ steps.validate.outputs.is_valid }}
      semver_tag: ${{ steps.validate.outputs.version }}
      target_run_id: ${{ steps.validate.outputs.run_id }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Run Python Validation Script
        id: validate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          EVENT: ${{ github.event_name }}
          TAG: ${{ inputs.manual_tag }}
          MANUAL_ID: ${{ inputs.override_run_id }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          SHA: ${{ github.event.workflow_run.head_sha }}
          AUTO_ID: ${{ github.event.workflow_run.id }}
        run: uv run --script dev/gh_workflow_release_validation.py

  release-docs:
    needs: prep-release
    if: ${{ needs.prep-release.outputs.is_valid_release == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download Docs Artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-html-artifact
          run-id: ${{ needs.prep-release.outputs.target_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ./docs

      - name: Deploy Versioned Documentation
        run: |
          echo "Deploying docs for version: ${{ needs.prep-release.outputs.semver_tag }}"

  publish-app:
    needs: prep-release
    if: ${{ needs.prep-release.outputs.is_valid_release == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download App Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-binary-artifact
          run-id: ${{ needs.prep-release.outputs.target_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ./app

      - name: Build and Push Docker Image
        run: |
          echo "This step would build and push a Docker image to ghcr.io/${{ github.repository }}:${{ needs.prep-release.outputs.semver_tag }}"

      # Task A: Create GitHub Release
      - name: Create GitHub Release with Binary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ needs.prep-release.outputs.semver_tag }} ./app/* --generate-notes

  publish-pypi:
    needs: prep-release
    if: ${{ needs.prep-release.outputs.is_valid_release == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Mandatory for trusted publishing
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Simulate PyPI Publishing
        run: echo "This step would publish the package to PyPI for version ${{ needs.prep-release.outputs.semver_tag }}"
