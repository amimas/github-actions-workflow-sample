name: Release Workflow

on:
  # Trigger A: Automatic execution when Main Workflow finishes
  workflow_run:
    workflows: ["Main Workflow"]
    types:
      - completed
  
  # Trigger B: Manual execution fallback from the GitHub UI
  workflow_dispatch:
    inputs:
      manual_tag:
        description: 'Tag to release (e.g., v1.2.3)'
        required: true
        type: string
      override_run_id:
        description: 'Main Workflow Run ID (Required if downloading artifacts)'
        required: true
        type: string

# Permissions required for Git Releases and GitHub Container Registry uploads
permissions:
  contents: write
  packages: write

jobs:
  prep-release:
    runs-on: ubuntu-latest
    outputs:
      is_valid_release: ${{ steps.validate.outputs.is_valid }}
      semver_tag: ${{ steps.validate.outputs.version }}
      target_run_id: ${{ steps.validate.outputs.run_id }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate Trigger and Determine Tag
        id: validate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_TAG: ${{ inputs.manual_tag }}
          INPUT_RUN_ID: ${{ inputs.override_run_id }}
          UPSTREAM_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          # SCENARIO 1: Manual execution
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "🔮 Triggered Manually via Workflow Dispatch."
            echo "is_valid=true" >> $GITHUB_OUTPUT
            echo "version=$INPUT_TAG" >> $GITHUB_OUTPUT
            echo "run_id=$INPUT_RUN_ID" >> $GITHUB_OUTPUT
            exit 0
          fi

          # SCENARIO 2: Automatic execution
          echo "🤖 Triggered Automatically by Main Workflow."
          if [ "$UPSTREAM_CONCLUSION" != "success" ]; then
            echo "is_valid=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          TAG_NAME=$(gh api repos/${{ github.repository }}/git/matching-refs/tags/v \
            --jq '.[] | select(.object.sha == "'$COMMIT_SHA'") | .ref' | head -n 1 | sed 's|refs/tags/||' || true)

          if [ -z "$TAG_NAME" ]; then
            TAG_NAME=$(gh api repos/${{ github.repository }}/tags \
              --jq '.[] | select(.commit.sha == "'$COMMIT_SHA'") | .name' | head -n 1 || true)
          fi

          if [ -z "$TAG_NAME" ]; then
            echo "is_valid=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "is_valid=true" >> $GITHUB_OUTPUT
          echo "version=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

  release-docs:
    needs: prep-release
    if: ${{ needs.prep-release.outputs.is_valid_release == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download Docs Artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-html-artifact
          run-id: ${{ needs.prep-release.outputs.target_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ./docs

      - name: Deploy Versioned Documentation
        run: |
          echo "Deploying docs for version: ${{ needs.prep-release.outputs.semver_tag }}"

  publish-app:
    needs: prep-release
    if: ${{ needs.prep-release.outputs.is_valid_release == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download App Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-binary-artifact
          run-id: ${{ needs.prep-release.outputs.target_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ./app

      # Task A: Create GitHub Release
      - name: Create GitHub Release with Binary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ needs.prep-release.outputs.semver_tag }} ./app/* --generate-notes
